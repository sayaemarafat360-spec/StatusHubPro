# Codemagic CI/CD Configuration for StatusHub Pro
# Documentation: https://docs.codemagic.io/yaml/basic-configuration/yaml-quick-start/
# NO KEYSTORE REQUIRED - Debug and Release builds are unsigned

workflows:
  # Debug Workflow - For development and testing
  debug-workflow:
    name: Debug Build
    max_build_duration: 30
    environment:
      vars:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: feature/*
          include: true
        - pattern: bugfix/*
          include: true
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      
      - name: Debug Build
        script: |
          ./gradlew assembleDebug --parallel --build-cache
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # Release Workflow - For production builds (UNSIGNED - No keystore needed)
  release-workflow:
    name: Release Build (Unsigned)
    max_build_duration: 45
    environment:
      vars:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        JAVA_OPTS: "-Xmx4g -XX:+UseParallelGC"
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release/*
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      
      - name: Clean build
        script: |
          ./gradlew clean
      
      - name: Run Lint
        script: |
          ./gradlew lintRelease --continue || true
      
      - name: Build Release APK (Unsigned)
        script: |
          ./gradlew assembleRelease --parallel --build-cache
      
      - name: Build Release Bundle (Unsigned)
        script: |
          ./gradlew bundleRelease --parallel --build-cache
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
      - app/build/reports/lint-results-release.html
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
