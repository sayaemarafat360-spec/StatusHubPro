# Codemagic CI/CD Configuration for StatusHub Pro
# Documentation: https://docs.codemagic.io/yaml/basic-configuration/yaml-quick-start/
# NO KEYSTORE REQUIRED - Debug and Release builds are unsigned

workflows:
  # Debug Workflow - For development and testing
  debug-workflow:
    name: Debug Build
    max_build_duration: 30
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: feature/*
          include: true
        - pattern: bugfix/*
          include: true
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Make gradlew executable
        script: |
          chmod +x ./gradlew
      
      - name: Debug Build
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # Release Workflow - For production builds (UNSIGNED - No keystore needed)
  release-workflow:
    name: Release Build (Unsigned)
    max_build_duration: 45
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release/*
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Make gradlew executable
        script: |
          chmod +x ./gradlew
      
      - name: Clean build
        script: |
          ./gradlew clean
      
      - name: Build Release APK (Unsigned)
        script: |
          ./gradlew assembleRelease
      
      - name: Build Release Bundle (Unsigned)
        script: |
          ./gradlew bundleRelease
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
